<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zune Now Playing</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="bg-image"></div>
    
    <div id="login-screen" class="glass-container">
        <h1 class="zune-text">ZUNE // CONNECT</h1>
        <button id="login-button" onclick="redirectToSpotify()">START</button>
    </div>

    <div id="player-screen" style="display: none;">
        <div class="zune-layout">
            <div class="art-section">
                <img id="track-img" src="" alt="Album Art">
            </div>
            <div class="text-meta">
                <h1 id="track-title">LOADING...</h1>
                <h2 id="track-artist">ARTIST</h2>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
