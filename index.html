<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zune Now Playing</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div id="bg-wrap" aria-hidden="true">
        <div class="bg-layer" id="bg-a"></div>
        <div class="bg-layer" id="bg-b"></div>
        
        <div class="spotlight-container">
            <div class="spotlight s1"></div>
            <div class="spotlight s2"></div>
            <div class="spotlight s3"></div>
        </div>

        <div class="bg-vignette"></div>
        <div class="bg-noise"></div>
    </div>

    <div id="login-screen" class="glass-container">
        <h1 class="zune-text">ZUNE // CONNECT</h1>
        <button id="login-button" onclick="redirectToSpotify()">START</button>
    </div>

    <div id="player-screen" style="display: none;">
        <div id="immersive-overlay-1" class="immersive-content">
            <div class="marquee-group">
                <div id="imm-track-1" class="imm-text song-title"></div>
                <div id="imm-artist-1" class="imm-text artist-name"></div>
                <div id="imm-album-1" class="imm-text album-title"></div>
            </div>
        </div>

        <div id="immersive-overlay-2" class="immersive-content">
            <div id="word-cloud-container"></div>
        </div>

        <div class="zune-layout">
            <div class="art-section">
                <img id="track-img" src="" alt="Album Art" />
            </div>

            <div class="text-meta">
                <h1 id="track-title">NOTHING PLAYING</h1>
                <h2 id="track-artist">OPEN SPOTIFY</h2>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
